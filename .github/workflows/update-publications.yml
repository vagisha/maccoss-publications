name: Update publications page

on:
  schedule:
    # 00:00 UTC on the 1st of every month
    - cron: "0 0 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest OpenAlex data
        run: python fetch_openalex_works.py

      - name: Rebuild index.html
        run: python build_page.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openalex_works.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Monthly update: refresh OpenAlex data and rebuild page"
            git push
          fi
